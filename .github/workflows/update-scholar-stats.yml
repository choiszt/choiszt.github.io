name: Update Scholar Stats

on:
  schedule:
    - cron: "0 0 * * *" # every day at 00:00 UTC (08:00 Beijing)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install scholarly

      - name: Fetch citation stats
        run: python scripts/update-scholar-stats.py

      - name: Commit updated stats
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update scholar stats"
          file_pattern: public/scholar-stats.json
