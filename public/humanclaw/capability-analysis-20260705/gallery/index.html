<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HCBv6 全量轨迹 Gallery（GPT-5 non-thinking）</title>
<style>
:root{--bg:#fcfcfa;--fg:#1e222a;--muted:#5b6472;--accent:#0f6f5c;--line:#dde1e6;--code:#f0f2f4}
@media(prefers-color-scheme:dark){:root{--bg:#14171c;--fg:#dfe4ea;--muted:#9aa4b2;--accent:#4fd1b5;--line:#2c333d;--code:#1e242c}}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--fg);font:15px/1.6 -apple-system,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif}
main{max-width:1360px;margin:0 auto;padding:16px 20px 80px}
h1{font-size:1.3em;border-bottom:2px solid var(--accent);padding-bottom:8px;margin:8px 0 6px}
a{color:var(--accent)}
nav.crumbs{max-width:1360px;margin:0 auto;padding:14px 20px 0;font-size:.88em}
nav.crumbs a{color:var(--muted);text-decoration:none}
nav.crumbs a:hover{color:var(--accent)}
nav.crumbs a.here{color:var(--accent);font-weight:600;border-bottom:2px solid var(--accent)}
nav.crumbs .sep{margin:0 7px;color:var(--line)}
.bar{position:sticky;top:0;background:var(--bg);padding:10px 0;border-bottom:1px solid var(--line);z-index:10;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.chip{cursor:pointer;border:1px solid var(--line);border-radius:14px;padding:2px 11px;font-size:.82em;color:var(--muted);background:none}
.chip.on{border-color:var(--accent);color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,transparent)}
select,input[type=text]{background:var(--bg);color:var(--fg);border:1px solid var(--line);border-radius:6px;padding:3px 8px;font-size:.85em}
.count{margin-left:auto;color:var(--muted);font-size:.85em}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:16px}
.card{border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--code);cursor:pointer}
.card img{width:100%;display:block;aspect-ratio:1;object-fit:cover;background:#fff}
.card video{width:100%;display:block;aspect-ratio:1;object-fit:cover;background:#000}
.cap .tname{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-weight:600;font-size:.98em;line-height:1.4;margin-bottom:2px}
.cap{padding:6px 10px;font-size:.78em;line-height:1.5}
.cap b{font-size:1.05em}
.tax{display:inline-block;padding:0 7px;border-radius:9px;font-size:.92em;border:1px solid var(--line);color:var(--muted)}
.tax.success{border-color:var(--accent);color:var(--accent)}
.tax.sys{border-color:#b8860b;color:#b8860b}
.vid{display:inline-block;padding:0 7px;border-radius:9px;font-size:.92em;border:1px solid #3b6fd4;color:#3b6fd4}
.feat{display:inline-block;padding:0 7px;border-radius:9px;font-size:.92em;border:1px solid #b8860b;color:#b8860b}
.more{display:block;margin:24px auto;padding:8px 26px;font-size:.95em;cursor:pointer;border:1px solid var(--accent);color:var(--accent);background:none;border-radius:8px}
label{font-size:.82em;color:var(--muted)}
/* modal */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;z-index:100;overflow-y:auto}
#modal.open{display:block}
.box{max-width:1100px;margin:4vh auto;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:18px 22px 26px;position:relative}
.close{position:absolute;top:10px;right:14px;font-size:1.5em;cursor:pointer;color:var(--muted);background:none;border:none}
.mhead{font-size:1.05em;margin:0 40px 4px 0}
.msub{color:var(--muted);font-size:.83em;margin-bottom:12px}
.mbody{display:flex;flex-wrap:wrap;gap:20px}
.viewer{position:relative;flex:0 1 460px;min-width:300px}
.viewer img{width:100%;display:block;border:1px solid var(--line);border-radius:8px;background:#fff}
.viewer canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.ctrl{display:flex;gap:10px;align-items:center;margin-top:8px;font-size:.85em;flex-wrap:wrap}
.ctrl button{cursor:pointer;border:1px solid var(--accent);color:var(--accent);background:none;border-radius:6px;padding:2px 14px;font-size:1em}
.ctrl input[type=range]{flex:1;min-width:120px}
.stepinfo{font-family:ui-monospace,monospace;color:var(--muted);min-width:150px}
.vidcol{flex:1 1 560px;min-width:340px}
.vidcol video{width:100%;border:1px solid var(--line);border-radius:8px}
.novid{color:var(--muted);font-size:.85em;border:1px dashed var(--line);border-radius:8px;padding:18px;text-align:center;margin-top:4px}
</style>
</head>
<body>
<nav class="crumbs"><a href="../../">HumanClaw</a><span class="sep">›</span><a href="../">误差分析报告</a><span class="sep">·</span><a href="./" class="here">全量 Gallery</a></nav>
<main>
<h1>全量轨迹 Gallery — GPT-5 (non-thinking)（1202 episodes）</h1>
<p style="color:var(--muted);font-size:.85em;margin:4px 0 10px">灰=navmesh · 蓝虚线=最短路径 · 彩色=实际轨迹（紫→黄按步数）· ★=目标实例。<b>点卡片打开详情：逐步回放动态轨迹；已渲染 3D 视频的任务（标 🎬）可直接播放。</b> ⭐ 精选案例为报告 §4 的行为模式代表，可用顶栏筛出。</p>

<div class="bar">
  <span id="cats"></span>
  <span style="color:var(--line)">|</span>
  <span id="outcomes"></span>
  <span style="color:var(--line)">|</span>
  <label>失败模式 <select id="tax"><option value="">全部</option></select></label>
  <label>scene <select id="scene"><option value="">全部</option></select></label>
  <button class="chip" id="feat">⭐ 精选案例</button>
  <label><input type="checkbox" id="hasvid"> 只看有视频的</label>
  <input type="text" id="q" placeholder="搜索: scene / ep / 类别" size="16">
  <label>排序 <select id="sort">
    <option value="default">scene·ep</option>
    <option value="path_asc">路径 短→长</option>
    <option value="path_desc">路径 长→短</option>
    <option value="mind_asc">min_dist 近→远</option>
  </select></label>
  <span class="count" id="count"></span>
</div>

<div class="grid" id="grid"></div>
<button class="more" id="more" style="display:none">加载更多</button>
</main>

<div id="modal">
  <div class="box">
    <button class="close" id="mclose">×</button>
    <h3 class="mhead" id="mtitle"></h3>
    <div class="msub" id="msub"></div>
    <div class="mbody">
      <div class="vidcol" id="vidcol"></div>
      <div class="viewer">
        <img id="mimg" alt="">
        <canvas id="mcanvas"></canvas>
        <div class="ctrl">
          <button id="play">▶ 播放</button>
          <input type="range" id="scrub" min="0" max="99" value="0">
          <select id="speed"><option value="4">慢速</option><option value="10" selected>常速</option><option value="25">快速</option></select>
          <span class="stepinfo" id="stepinfo"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const PAGE=60;
// 已渲染 3D 视频的任务（videos_manifest.json 生成，scale-up 时只需更新 manifest）
let VIDEOS={};
// 精选案例（报告 §4 的行为模式代表）
const FEATURED={
 "102344529|19":{tag:"case01",pat:"意图震荡",note:"t=49 达 d=0 后，「确认接触」与「转身准备坐」两个子目标交替 50 步，互相撤销进展直到耗尽。"},
 "102343992|12":{tag:"case02",pat:"接触确认缺失",note:"t=14 已触到目标（d=0.00），此后 85 步反复 close the final centimeters 微横移，从未尝试 Stop。"},
 "102344094|14":{tag:"case03",pat:"门口对齐循环",note:"窄门 threading 左右微转互相抵消（t=43–60）；后期在目标 0.3m 附近却开始重新扫描找 plant。"},
 "102344094|8":{tag:"case04",pat:"开环无效重复",note:"d=0.66 起连续 25+ 次向左横移，距离升到 0.81m 仍不换方向；后期把镜子误当 TV 越走越远。"},
 "102344094|21":{tag:"case05",pat:"门口死循环",note:"3.5m 的 easy 任务：门口 turn-center 循环 20 步，进房又退出，最后跑去厨房，d 从 3.0 涨到 4.5m。"},
 "106878858_174886965|15":{tag:"case06",pat:"长路径预算耗尽",note:"28.6m 户外场景：定向推进、系统性探索，100 步 d 从 19m 降到 9.9m——行为合理但步数不够。"},
 "106878858_174886965|14":{tag:"case07",pat:"长路径预算耗尽",note:"同场景另一例：同样定向推进但 100 步预算耗尽。"},
 "107734254_176000121|19":{tag:"case08",pat:"深度误判",note:"连续 25 步小角度右转 center the TV（越转越远），随后在 4.3m 处反复宣称 zero-distance。"},
 "104862501_172226556|25":{tag:"case09",pat:"无效动作重复",note:"d≈8m 隔床对右墙 60 步 tiny right side step，动作被床挡住无效，距离纹丝不动。"},
 "104862501_172226556|18":{tag:"case10",pat:"多实例救场",note:"先认错目标（对 piano bench 使劲），后透过门口看到另一把椅子改道，d=0 后明确宣布接触并 Stop。"},
 "102817140|22":{tag:"case11",pat:"成功模板",note:"14.8m 真·长路径：定向穿房（d 单调 11.25→0.14）→ sit 编舞 22 步 → t=87 主动 Stop。全部子能力齐备。"},
 "107734287_176000160|24":{tag:"case12",pat:"幻觉停止",note:"窄角落左右交替转向 37 步（净位移 1.9m），t=38 在 10m 处宣布 Stop since I am already touching the TV。"}};
let DATA=[],TRAJ=null,view=[],shown=0;
const state={cat:"",outcome:"",tax:"",scene:"",q:"",sort:"default",hasvid:false,featured:false};
const $=id=>document.getElementById(id);
const key=d=>`${d.scene}|${d.ep}`;

function chip(el,items,k){
  items.forEach(v=>{
    const b=document.createElement("button");
    b.className="chip"+(state[k]===v.val?" on":"");
    b.textContent=v.label;
    b.onclick=()=>{state[k]=v.val;el.querySelectorAll(".chip").forEach(c=>c.classList.remove("on"));b.classList.add("on");refresh();};
    el.appendChild(b);
  });
}

function refresh(){
  view=DATA.filter(d=>
    (!state.cat||d.cat===state.cat)&&
    (!state.outcome||(state.outcome==="success")===(d.success===1))&&
    (!state.tax||d.tax===state.tax)&&
    (!state.scene||d.scene===state.scene)&&
    (!state.hasvid||VIDEOS[key(d)])&&
    (!state.featured||FEATURED[key(d)])&&
    (!state.q||`${d.scene} ${d.ep} ${d.cat} ep${d.ep}`.toLowerCase().includes(state.q)));
  if(state.sort==="path_asc")view.sort((a,b)=>(a.path_m??1e9)-(b.path_m??1e9));
  else if(state.sort==="path_desc")view.sort((a,b)=>(b.path_m??-1)-(a.path_m??-1));
  else if(state.sort==="mind_asc")view.sort((a,b)=>(a.min_dist??1e9)-(b.min_dist??1e9));
  else view.sort((a,b)=>a.scene===b.scene?(+a.ep)-(+b.ep):a.scene<b.scene?-1:1);
  shown=0;$("grid").innerHTML="";addPage();
  $("count").textContent=`${view.length} / ${DATA.length}`;
}

function addPage(){
  const frag=document.createDocumentFragment();
  view.slice(shown,shown+PAGE).forEach(d=>{
    const c=document.createElement("div");
    c.className="card";
    const taxCls=d.success?"success":(d.tax==="verifier_bug_stop"||d.tax==="system_forced_stop"?"sys":"");
    const vf=VIDEOS[key(d)];
    const vid=vf?'<span class="vid">🎬 视频</span> ':"";
    const f=FEATURED[key(d)];
    const feat=f?`<span class="feat">⭐ ${f.tag} ${f.pat}</span> `:"";
    const tname=d.ins||`${d.cat} task`;
    const media=vf
      ?`<video muted loop playsinline preload="none" poster="figs_all/${d.img}" src="videos/${vf}"></video>`
      :`<img loading="lazy" src="figs_all/${d.img}" alt="${d.scene} ep${d.ep}">`;
    c.innerHTML=`${media}
      <div class="cap"><div class="tname" title="${tname.replace(/"/g,"&quot;")}">${tname}</div>
      <span style="color:var(--muted)">${d.cat} · ${d.scene} · ep${d.ep}</span><br>
      ${feat}${vid}<span class="tax ${taxCls}">${d.tax}</span>
      path ${d.path_m??"NaN"}m · min_dist ${d.min_dist??"?"}m · ${d.steps??"?"} steps</div>`;
    if(vf){
      const v=c.querySelector("video");
      c.onmouseenter=()=>{v.play().catch(()=>{});};
      c.onmouseleave=()=>{v.pause();};
    }
    c.onclick=()=>openModal(d);
    frag.appendChild(c);
  });
  $("grid").appendChild(frag);
  shown=Math.min(shown+PAGE,view.length);
  $("more").style.display=shown<view.length?"block":"none";
  $("more").textContent=`加载更多（${shown}/${view.length}）`;
}
$("more").onclick=addPage;

/* ---------- modal + trajectory player ---------- */
let anim={timer:null,idx:0,pts:null,d:null};
function stopAnim(){if(anim.timer){clearInterval(anim.timer);anim.timer=null;}$("play").textContent="▶ 播放";}

function w2p(x,z,d,W){
  const px=(x-(d.cx-d.span))/(2*d.span)*W;
  const py=((d.cz+d.span)-z)/(2*d.span)*W;
  return [px,py];
}

function drawFrame(d,i){
  const cv=$("mcanvas"),ctx=cv.getContext("2d");
  const W=cv.width;
  ctx.clearRect(0,0,W,W);
  const pts=anim.pts;
  if(!pts||!pts.length||d.cx==null)return;
  ctx.lineWidth=3;ctx.strokeStyle="#d62728";ctx.lineJoin="round";
  ctx.beginPath();
  for(let k=0;k<=i&&k<pts.length;k++){
    const [px,py]=w2p(pts[k][0],pts[k][1],d,W);
    k?ctx.lineTo(px,py):ctx.moveTo(px,py);
  }
  ctx.stroke();
  const cur=pts[Math.min(i,pts.length-1)];
  const [px,py]=w2p(cur[0],cur[1],d,W);
  ctx.beginPath();ctx.arc(px,py,8,0,7);ctx.fillStyle="#d62728";ctx.fill();
  ctx.lineWidth=2.5;ctx.strokeStyle="#fff";ctx.stroke();
  const dist=cur[2]!=null?` · d=${cur[2].toFixed(2)}m`:"";
  const stop=cur[3]?" · STOP":"";
  $("stepinfo").textContent=`step ${Math.min(i,pts.length-1)+1}/${pts.length}${dist}${stop}`;
  $("scrub").value=i;
}

function openModal(d){
  stopAnim();
  $("mtitle").textContent=d.ins||`${d.cat} · scene ${d.scene} · ep ${d.ep}`;
  const f=FEATURED[key(d)];
  const featLine=f?`<div style="margin:2px 0 6px"><span class="feat">⭐ ${f.tag} · ${f.pat}</span> ${f.note}</div>`:"";
  $("msub").innerHTML=featLine+`<b>${d.cat}</b> · scene ${d.scene} · ep ${d.ep} · ${d.tax} · path ${d.path_m??"NaN"}m · min_dist ${d.min_dist??"?"}m · ${d.steps??"?"} steps · <a href="figs_all/${d.img}" target="_blank">打开大图 ↗</a>`;
  $("mimg").src="figs_all/"+d.img;
  const v=VIDEOS[key(d)];
  $("vidcol").innerHTML=v
    ?`<video controls autoplay muted preload="metadata" src="videos/${v}"></video><div style="color:var(--muted);font-size:.8em;margin-top:4px">三联：ego 视角 | 第三人称 3D | 逐帧同步 BEV（右图为静态全轨迹，可拖动逐步回放）</div>`
    :`<div class="novid">该 task 的 3D 视频正在批量渲染队列中<br>（全量生成进行中，完成后自动上线）</div>`;
  $("modal").classList.add("open");
  const setup=()=>{
    const cv=$("mcanvas");cv.width=600;cv.height=600;
    anim.pts=(TRAJ&&TRAJ[key(d)])||[];
    anim.idx=0;anim.d=d;
    $("scrub").max=Math.max(anim.pts.length-1,0);
    drawFrame(d,0);
  };
  if(!TRAJ){
    $("stepinfo").textContent="加载轨迹…";
    fetch("gallery_traj.json").then(r=>r.json()).then(t=>{TRAJ=t;setup();});
  }else setup();
}
$("mclose").onclick=()=>{stopAnim();$("modal").classList.remove("open");};
$("modal").onclick=e=>{if(e.target.id==="modal"){stopAnim();$("modal").classList.remove("open");}};
$("play").onclick=()=>{
  if(anim.timer){stopAnim();return;}
  if(!anim.pts||!anim.pts.length)return;
  if(anim.idx>=anim.pts.length-1)anim.idx=0;
  $("play").textContent="⏸ 暂停";
  const tick=()=>{
    anim.idx++;
    if(anim.idx>=anim.pts.length){stopAnim();anim.idx=anim.pts.length-1;}
    drawFrame(anim.d,anim.idx);
  };
  anim.timer=setInterval(tick,1000/(+$("speed").value));
};
$("scrub").oninput=e=>{stopAnim();anim.idx=+e.target.value;drawFrame(anim.d,anim.idx);};
document.addEventListener("keydown",e=>{if(e.key==="Escape"){stopAnim();$("modal").classList.remove("open");}});

Promise.all([
  fetch("gallery_meta.json").then(r=>r.json()),
  fetch("videos_manifest.json").then(r=>r.ok?r.json():{}).catch(()=>({}))
]).then(([data,vids])=>{
  VIDEOS=vids;
  DATA=data;
  chip($("cats"),[{label:"全部类别",val:""},...[...new Set(data.map(d=>d.cat))].sort().map(c=>({label:c,val:c}))],"cat");
  chip($("outcomes"),[{label:"全部结果",val:""},{label:"成功",val:"success"},{label:"失败",val:"fail"}],"outcome");
  [...new Set(data.map(d=>d.tax))].sort().forEach(t=>{const o=document.createElement("option");o.value=t;o.textContent=t;$("tax").appendChild(o);});
  [...new Set(data.map(d=>d.scene))].sort().forEach(s=>{const o=document.createElement("option");o.value=s;o.textContent=s;$("scene").appendChild(o);});
  $("tax").onchange=e=>{state.tax=e.target.value;refresh();};
  $("scene").onchange=e=>{state.scene=e.target.value;refresh();};
  $("q").oninput=e=>{state.q=e.target.value.trim().toLowerCase();refresh();};
  $("sort").onchange=e=>{state.sort=e.target.value;refresh();};
  $("hasvid").onchange=e=>{state.hasvid=e.target.checked;refresh();};
  $("feat").onclick=()=>{state.featured=!state.featured;$("feat").classList.toggle("on",state.featured);refresh();};
  // URL 参数: ?featured=1 &cat= &tax= &scene= &q= &task=scene|ep
  const P=new URLSearchParams(location.search);
  if(P.get("featured")==="1"){state.featured=true;$("feat").classList.add("on");}
  if(P.get("cat")){state.cat=P.get("cat");}
  if(P.get("tax")){state.tax=P.get("tax");$("tax").value=state.tax;}
  if(P.get("scene")){state.scene=P.get("scene");$("scene").value=state.scene;}
  if(P.get("q")){state.q=P.get("q").toLowerCase();$("q").value=P.get("q");}
  if(P.get("featured")||P.get("cat")||P.get("tax")||P.get("scene")||P.get("q"))refresh();
  const tk=P.get("task");
  if(tk){const d=DATA.find(x=>key(x)===tk);if(d)openModal(d);}
  refresh();
});
</script>
</body>
</html>
